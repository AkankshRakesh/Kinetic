apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: kinetic-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: kinetic-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 60m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 192Mi
