apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-email
  namespace: kinetic-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-email
  template:
    metadata:
      labels:
        app: worker-email
    spec:
      containers:
        - name: worker-email
          image: kinetic-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "queue:work", "--queue=emails", "--sleep=3", "--tries=3", "--timeout=120"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 192Mi
---
