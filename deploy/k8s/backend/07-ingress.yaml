apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: kinetic-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /api/login
            pathType: Prefix
            backend:
              service:
                name: backend-auth
                port:
                  number: 8080
          - path: /api/register
            pathType: Prefix
            backend:
              service:
                name: backend-auth
                port:
                  number: 8080
          - path: /api/logout
            pathType: Prefix
            backend:
              service:
                name: backend-auth
                port:
                  number: 8080
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: backend-auth
                port:
                  number: 8080
          - path: /sanctum
            pathType: Prefix
            backend:
              service:
                name: backend-auth
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8080
          - path: /up
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8080
