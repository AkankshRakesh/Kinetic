apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-auth
  namespace: kinetic-backend
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: backend-auth
  template:
    metadata:
      labels:
        app: backend-auth
    spec:
      priorityClassName: high-priority

      nodeSelector:
        app-worker: "true"
      
      containers:
        - name: auth
          image: akankshrakesh/kinetic-backend:${BUILD_NUMBER} # or use :${BUILD_NUMBER}
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "384Mi"

          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-auth
  namespace: kinetic-backend
spec:
  selector:
    app: backend-auth
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
