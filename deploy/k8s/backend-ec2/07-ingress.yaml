apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: kinetic-backend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: 100.27.210.58
    http:
      paths:

      - path: /auth(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-auth
            port:
              number: 8080

      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-general
            port:
              number: 8080

      - path: /sanctum(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-auth
            port:
              number: 8080