apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-general
  namespace: kinetic-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-general
  template:
    metadata:
      labels:
        app: backend-general
    spec:
      containers:
        - name: general
          image: akankshrakesh/kinetic-backend:latest # or use :${BUILD_NUMBER}
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-general
  namespace: kinetic-backend
spec:
  selector:
    app: backend-general
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
